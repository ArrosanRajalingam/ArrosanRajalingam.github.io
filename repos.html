<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositories — Arrosan Rajalingam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-card: #111111;
            --bg-code: #161616;
            --text: #e8e8e8;
            --text-muted: #999;
            --text-dim: #666;
            --accent: #64b5f6;
            --accent-glow: rgba(100, 181, 246, 0.1);
            --green: #66bb6a;
            --orange: #ffa726;
            --purple: #ba68c8;
            --red: #ef5350;
            --yellow: #ffee58;
            --border: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.75; font-size: 16px; padding-top: 56px; }

        /* ── Navigation ── */
        .site-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; background: rgba(10,10,10,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 24px; }
        .site-nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .site-nav-brand { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; color: #f0f0f0; text-decoration: none; }
        .site-nav-brand span { color: var(--accent); }
        .site-nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }
        .site-nav-links a { font-size: 0.82rem; font-weight: 500; color: rgba(255,255,255,0.55); text-decoration: none; padding: 8px 14px; border-radius: 6px; transition: all 0.2s; }
        .site-nav-links a:hover { color: #fff; background: rgba(255,255,255,0.06); }
        .site-nav-links a.active { color: var(--accent); background: var(--accent-glow); }
        .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
        .nav-toggle span { display: block; width: 20px; height: 2px; background: #ccc; margin: 5px 0; border-radius: 1px; }
        @media (max-width: 640px) {
            .nav-toggle { display: block; }
            .site-nav-links { display: none; position: absolute; top: 56px; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(16px); flex-direction: column; padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 2px; }
            .site-nav-links.open { display: flex; }
            .site-nav-links a { width: 100%; padding: 10px 14px; }
        }

        /* ── Page Header ── */
        .page-header { padding: 72px 24px 56px; text-align: center; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
        .page-header::before { content: ''; position: absolute; top: -50%; left: -20%; width: 140%; height: 200%; background: radial-gradient(ellipse at 30% 50%, rgba(100,181,246,0.04) 0%, transparent 50%), radial-gradient(ellipse at 70% 50%, rgba(102,187,106,0.03) 0%, transparent 50%); z-index: 0; }
        .page-header > * { position: relative; z-index: 1; }
        .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 900; margin-bottom: 12px; }
        .page-header p { color: var(--text-muted); font-size: 1rem; max-width: 520px; margin: 0 auto; }
        .gh-link { display: inline-flex; align-items: center; gap: 8px; margin-top: 20px; color: var(--accent); text-decoration: none; font-size: 0.85rem; font-weight: 500; padding: 8px 16px; border: 1px solid rgba(100,181,246,0.25); border-radius: 8px; transition: all 0.2s; }
        .gh-link:hover { background: var(--accent-glow); }
        .gh-link svg { width: 18px; height: 18px; fill: currentColor; }

        /* ── Repos Grid ── */
        .repos-container { max-width: 960px; margin: 0 auto; padding: 48px 24px 80px; }

        .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
        .filter-btn {
            font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.5px;
            padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
            background: none; color: var(--text-muted); cursor: pointer; transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active { color: var(--accent); border-color: rgba(100,181,246,0.3); background: var(--accent-glow); }

        .repos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

        .repo-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
            padding: 24px; transition: all 0.25s; display: flex; flex-direction: column; min-height: 160px;
        }
        .repo-card:hover { border-color: rgba(100,181,246,0.2); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

        .repo-name { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; font-weight: 600; color: var(--accent); text-decoration: none; display: block; margin-bottom: 8px; }
        .repo-name:hover { text-decoration: underline; }
        .repo-desc { color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; flex: 1; margin-bottom: 16px; }
        .repo-meta { display: flex; align-items: center; gap: 16px; font-size: 0.75rem; color: var(--text-dim); }
        .repo-lang { display: flex; align-items: center; gap: 5px; }
        .lang-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

        .loading { text-align: center; padding: 60px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }

        /* Language colors */
        .lang-python { background: #3572A5; }
        .lang-r { background: #198CE7; }
        .lang-shell { background: #89e051; }
        .lang-html { background: #e34c26; }
        .lang-css { background: #563d7c; }
        .lang-javascript { background: #f1e05a; }
        .lang-nextflow { background: #3ac486; }
        .lang-perl { background: #0298c3; }
        .lang-default { background: #666; }

        /* ── Footer ── */
        .site-footer { text-align: center; padding: 32px 24px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.8rem; }
        .site-footer a { color: var(--accent); text-decoration: none; }

        html { scroll-behavior: smooth; }
        ::selection { background: rgba(100,181,246,0.3); }
    </style>
</head>
<body>

    <nav class="site-nav">
        <div class="site-nav-inner">
            <a href="index.html" class="site-nav-brand">Arrosan <span>R.</span></a>
            <button class="nav-toggle" onclick="document.querySelector('.site-nav-links').classList.toggle('open')" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <ul class="site-nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="repos.html" class="active">Repositories</a></li>
                <li><a href="protocols.html">Protocols</a></li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <h1>Repositories</h1>
        <p>Public GitHub repositories — analysis scripts, pipelines, and reproducible workflows.</p>
        <a href="https://github.com/arrosanrajalingam" target="_blank" class="gh-link">
            <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            View on GitHub
        </a>
    </header>

    <main class="repos-container">
        <div class="filter-bar">
            <button class="filter-btn active" data-lang="all">All</button>
        </div>
        <div class="repos-grid" id="repos-grid">
            <div class="loading">Loading repositories...</div>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Arrosan Rajalingam &nbsp;·&nbsp; <a href="https://arrosanrajalingam.github.io">arrosanrajalingam.github.io</a></p>
    </footer>

    <script>
        const GITHUB_USER = 'arrosanrajalingam';
        const langColors = {
            'Python': 'lang-python', 'R': 'lang-r', 'Shell': 'lang-shell',
            'HTML': 'lang-html', 'CSS': 'lang-css', 'JavaScript': 'lang-javascript',
            'Nextflow': 'lang-nextflow', 'Perl': 'lang-perl'
        };

        async function fetchRepos() {
            const grid = document.getElementById('repos-grid');
            try {
                const res = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?sort=updated&per_page=30`);
                const repos = await res.json();

                if (!repos.length) { grid.innerHTML = '<p style="color:var(--text-dim)">No public repositories found.</p>'; return; }

                // Collect languages for filter
                const languages = new Set();
                repos.forEach(r => { if (r.language) languages.add(r.language); });

                const filterBar = document.querySelector('.filter-bar');
                languages.forEach(lang => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.dataset.lang = lang;
                    btn.textContent = lang;
                    filterBar.appendChild(btn);
                });

                // Render repos
                grid.innerHTML = repos
                    .filter(r => !r.fork)
                    .map(r => `
                        <div class="repo-card" data-lang="${r.language || ''}">
                            <a href="${r.html_url}" target="_blank" class="repo-name">${r.name}</a>
                            <p class="repo-desc">${r.description || 'No description'}</p>
                            <div class="repo-meta">
                                ${r.language ? `<span class="repo-lang"><span class="lang-dot ${langColors[r.language] || 'lang-default'}"></span>${r.language}</span>` : ''}
                                ${r.stargazers_count ? `<span>★ ${r.stargazers_count}</span>` : ''}
                                <span>Updated ${new Date(r.updated_at).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' })}</span>
                            </div>
                        </div>
                    `).join('');

                // Filter functionality
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        const lang = btn.dataset.lang;
                        document.querySelectorAll('.repo-card').forEach(card => {
                            card.style.display = (lang === 'all' || card.dataset.lang === lang) ? '' : 'none';
                        });
                    });
                });

            } catch (e) {
                grid.innerHTML = `<p style="color:var(--red)">Failed to load repositories. <a href="https://github.com/${GITHUB_USER}" style="color:var(--accent)">View on GitHub</a></p>`;
            }
        }

        fetchRepos();
    </script>

</body>
</html>
